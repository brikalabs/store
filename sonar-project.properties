# SonarCloud configuration. Import brikalabs/store on sonarcloud.io under the
# brikalabs organization; the keys below follow the GitHub-org-import default.
# The Quality Gate (>=90% coverage on new code, 0 new issues, 0% duplication)
# is configured on sonarcloud.io, not here.
sonar.organization=brikalabs
sonar.projectKey=brikalabs_store
sonar.projectName=Brika Store
sonar.projectVersion=0.1.0

# What to scan: the package and app source trees. Files matching the test
# inclusions below are treated as tests rather than analyzed as product code.
sonar.sources=packages,apps
sonar.tests=packages,apps
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Don't analyze dependencies, build output, generated migrations, declaration
# files, or the playwright e2e suite.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.wrangler/**,**/.output/**,**/.vite/**,**/coverage/**,**/drizzle/**,**/*.d.ts,apps/web/e2e/**

sonar.sourceEncoding=UTF-8

# Coverage, emitted by `bun test --coverage` in CI as lcov.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions: surfaces the bun:test runner can't reach today, so the
# gate reflects testable code rather than the absence of a component-test
# harness. React UI + route components, build/config, and app entrypoints.
sonar.coverage.exclusions=apps/web/**/*.tsx,apps/web/src/routes/**,apps/web/src/components/**,**/*.config.ts,**/*.config.tsx,apps/*/src/index.ts,**/*.d.ts

# Wait for the Quality Gate result and fail the scan step if it fails, so the
# SonarCloud Scan job is a single red/green status check branch protection can
# require.
sonar.qualitygate.wait=true
