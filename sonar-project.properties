# SonarCloud configuration. Custom Quality Gates are a paid feature, so the
# 90% coverage / 0 issues / 0% duplication thresholds are enforced in CI by
# scripts/check-sonar-gate.ts, which reads this analysis back via the API. This
# scan just produces the data (issues, duplication, lcov coverage).
sonar.organization=brikalabs
sonar.projectKey=brikalabs_store
sonar.projectName=Brika Store
sonar.projectVersion=0.1.0

# What to scan: the package and app source trees. Files matching the test
# inclusions below are treated as tests rather than analyzed as product code.
sonar.sources=packages,apps
sonar.tests=packages,apps
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Don't analyze dependencies, build output, generated code (route tree,
# migrations), declaration files, or the playwright e2e suite.
sonar.exclusions=**/node_modules/**,**/dist/**,**/out/**,**/.wrangler/**,**/.output/**,**/.vite/**,**/coverage/**,**/drizzle/**,**/*.d.ts,**/*.gen.ts,apps/web/e2e/**

sonar.sourceEncoding=UTF-8

# Coverage, emitted by `bun test --coverage` in CI as lcov.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage policy: the gate measures the domain + backend (packages/* and the
# registry worker), which is unit-tested with bun:test. It excludes surfaces
# that are not unit-tested by design:
#   - apps/web: the storefront, covered by the Playwright e2e suite (not in the
#     coverage run) rather than unit tests.
#   - apps/cli: thin command + I/O wrappers (clipboard, browser, sigstore)
#     exercised end to end, not unit-tested.
#   - packages/cli-kit: vendored from the hub monorepo; tested upstream.
#   - db client factories and app entrypoints: framework/driver glue.
#   - test-harness.ts: test infrastructure.
#   - markers CLI bin + VSCode extension: thin entrypoint/editor glue, exercised
#     by hand (the markers engine itself, packages/markers/src/core + scan, is
#     unit-tested and stays in coverage).
#   - registry scripts (seed.ts): a one-shot dev/seed script (top-level await,
#     npm fetch, file writes), run by hand like the CLI - not unit-tested.
#   - @brika/i18n React layer (react.ts): thin hooks (provider/useT/useLocale +
#     useMemo wrappers over the tested pure formatters in index.ts), like apps/web
#     React; the logic (createTranslator, format*, buildCatalogs) stays in coverage.
sonar.coverage.exclusions=apps/web/**,apps/cli/**,packages/cli-kit/**,packages/markers/src/cli.ts,packages/markers/src/extension.ts,packages/i18n/src/react.ts,apps/registry/scripts/**,**/db/src/client.ts,apps/*/src/index.ts,**/test-harness.ts,**/*.config.ts,**/*.config.tsx,**/*.gen.ts,**/*.d.ts

# The scan does not wait on the built-in "Sonar way" gate; check-sonar-gate.ts
# is the authority and enforces only Brika's thresholds (coverage/issues/
# duplication), ignoring Sonar way conditions the project does not gate on
# (ratings, security hotspots).
sonar.qualitygate.wait=false
