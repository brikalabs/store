name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # SonarCloud blame-tracking and PR decoration need full history,
          # not the default shallow clone.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test with coverage
        # bunfig.toml emits lcov + text into ./coverage; the scope mirrors the
        # root `test` script so it stays a bun:test run (no playwright e2e).
        # sonar.javascript.lcov.reportPaths points the scanner at the same path.
        run: bun test --coverage packages apps/registry apps/cli

      - name: SonarCloud Scan
        # sonar.qualitygate.wait=true (sonar-project.properties) makes this step
        # fail when the Quality Gate fails, so branch protection can require it.
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
