name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # SonarCloud blame-tracking and PR decoration need full history,
          # not the default shallow clone.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test with coverage
        # bunfig.toml emits lcov + text into ./coverage; the scope mirrors the
        # root `test` script so it stays a bun:test run (no playwright e2e).
        # sonar.javascript.lcov.reportPaths points the scanner at the same path.
        run: bun test --coverage packages apps/registry apps/cli

      - name: SonarCloud Scan
        # sonar.qualitygate.wait=true (sonar-project.properties) makes the
        # scanner wait until SonarCloud finishes processing this analysis, so the
        # measures the gate step reads below are fresh.
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Quality gate (Brika thresholds)
        # Custom Quality Gates are a paid SonarCloud feature, so we read the
        # analysis back via the API and enforce >=90% coverage / 0 issues / 0%
        # duplication on new code ourselves. This is what makes the job red.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PR: ${{ github.event.pull_request.number }}
        run: bun run scripts/check-sonar-gate.ts
