name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  lint-pr-title:
    name: PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional-commit types, matching the repo's commit history
          # (`feat(store): ...`, `chore: ...`).
          types: |
            feat
            fix
            chore
            docs
            refactor
            perf
            test
            ci
            build
            style
          requireScope: false
